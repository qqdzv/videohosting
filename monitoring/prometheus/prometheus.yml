global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:80"]

  - job_name: notifications
    metrics_path: /metrics
    static_configs:
      - targets: ["notifications:80"]

  - job_name: converter
    metrics_path: /metrics
    static_configs:
      - targets: ["converter:80"]
