repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-linter
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: ty-check
        name: ty-type-checker
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
