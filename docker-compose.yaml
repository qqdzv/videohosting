services:
  postgres:
    image: postgres:17
    container_name: db_app
    profiles: ["default", "infra"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES__USER}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES_DB: ${POSTGRES__NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USER} -d ${POSTGRES__NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis_app
    profiles: ["default", "infra"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:4.0
    container_name: kafka
    profiles: ["default", "infra"]
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka-data:/bitnami
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5


  s3:
    image: gresau/localstack-persist:4
    container_name: s3
    profiles: ["default", "infra"]
    restart: unless-stopped
    ports:
      - "4566:4566"
    env_file:
      - .env
    environment:
      - PERSIST_DEFAULT=1
    volumes:
      - "./storage/localstack/setup.py:/etc/localstack/init/ready.d/setup.py:ro"
      - "localstack-data:/persisted-data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend-app
    profiles: ["default", "app"]
    restart: unless-stopped
    ports:
      - "8088:80"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./secrets:/run/secrets:ro
    command: "uvicorn --factory main:create_app --reload --host 0.0.0.0 --port 80"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      s3:
        condition: service_healthy

  converter:
    build: ./converter
    container_name: converter-app
    profiles: ["default", "app"]
    restart: unless-stopped
    expose:
      - "80"
    env_file:
      - ./converter/.env
    volumes:
      - ./converter/src:/app/src
    command: sh -c "faststream run main:app --reload"
    depends_on:
      kafka:
        condition: service_healthy
      s3:
        condition: service_healthy

  notifications:
    build: ./notifications
    container_name: notifications-app
    profiles: ["default", "app"]
    restart: unless-stopped
    ports:
      - "8081:80"
    env_file:
      - ./notifications/.env
    volumes:
      - ./notifications:/app
      - ./secrets:/run/secrets:ro
    command: sh -c "uvicorn --factory main:configure_fastapi_app --reload --host 0.0.0.0 --port 80"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend-app
    profiles: ["default", "app"]
    restart: unless-stopped
    init: true
    ports:
      - "443:443"
      - "80:80"
    expose:
      - "3000"
    env_file:
      - ./frontend/.env
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    profiles: ["monitoring"]
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - ./monitoring/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:v1.8.0
    container_name: alloy
    profiles: ["monitoring"]
    restart: unless-stopped
    expose:
      - "12345"
    env_file:
      - .env
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    expose:
      - "9090"
    env_file:
      - .env
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "8888:3000"
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA__ADMIN_LOGIN}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA__ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy

volumes:
  db-data:
  redis-data:
  kafka-data:
  localstack-data:
  caddy_data:
  caddy_config:
  loki-data:
  prometheus-data:
  grafana-data:
